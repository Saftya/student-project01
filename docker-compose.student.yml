name: mini_rag_student_project

services:
  workshop:
    image: mini-rag-workshop:latest
    build: .
    container_name: mini_rag_student
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - ANONYMIZED_TELEMETRY=False
      - ORT_LOGGING_LEVEL=ERROR
    command: tail -f /dev/null
    tty: true
